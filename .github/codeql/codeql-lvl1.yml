name: "CodeQL base config"

disable-default-queries: true

packs:
    # > Java/Kotlin queries
    # - advanced-security/codeql-java
    # - advanced-security/codeql-java-extensions
    # security-extended
    # - codeql/java-queries:codeql-suites/java-security-extended.qls

    # JavaScript/TypeScript queries
    - advanced-security/codeql-javascript
    - advanced-security/codeql-javascript-extensions
    # security-extended
    - codeql/javascript-queries:codeql-suites/javascript-security-extended.qls
    
queries:
  - uses: security-and-quality
  

query-filters:
  - include:
    tags contain:
    - security
    precision:
    - critical
    - very-high
    - high

  - exclude:
    problem.severity:
      - warning
      - recommendation

paths:
 - 'packages'
paths-ignore: 
  - uses: ./.github/codeql/codeql-path-ignore.qls
